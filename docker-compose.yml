services:
  db:
    image: postgres:16
    container_name: rutinapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rutinapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rutinapp}
      POSTGRES_DB: ${POSTGRES_DB:-rutinapp}
    # Host usa 5433 para no chocar con un PostgreSQL nativo en 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rutinapp} -d ${POSTGRES_DB:-rutinapp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # pgAdmin opcional para inspeccionar la BD desde el navegador (http://localhost:5050)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rutinapp_pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@rutinapp.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
