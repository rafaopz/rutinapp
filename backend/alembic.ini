# Configuración de Alembic. La URL de la BD NO se define aquí: se inyecta en
# alembic/env.py desde app.core.config (que la lee del .env).
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Nombre de archivos de migración: 0001_descripcion, 0002_descripcion, ...
file_template = %%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
